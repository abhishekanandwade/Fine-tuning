appname: "go-postdatamanagement" # change appname accordingly. This is necessary for tracing. else will not work.
trace:
  enabled: true #trace enable/disable
  processor: 
    type: "otlp-grpc"
    options:
      host: "localhost:4317"
  sampler:
    type: always-on
    # type: parent-based-trace-id-ratio
    options: 
      ratio: 0.1
cache:
  redisserver: localhost:6379
  redispassword: 
  redisdbindex: 0
  redisexpirationtime: 1m
  lccapacity: 10000
  lcnumshards: 20
  lcttl: 2m 
  lcevictionpercentage: 10
  lcminrefreshdelay: 15m
  lcmaxrefreshdelay: 30m
  lcretrybasedelay: 1s
  lcbatchsize: 10
  lcbatchbuffertimeout: 30s
db:
  username: ""
  password: ""
  host: ""
  port: ""
  database: ""
  schema: ""
  maxconns: 10
  minconns: 1
  maxconnlifetime: 30
  maxconnidletime: 10
  healthcheckperiod: 5
  QueryTimeoutLow: 2s
  QueryTimeoutMed: 5s
info:  ## This is the information that will be displayed in the swagger
  name: "PMDM"
  version: "1.0.0"
  description: "test service"
  title: "PMDM"
  terms: "https://example.com/terms"
  email: "test@gmail.com" ## This is the email address to contact the API maintainer and this reflects in swagger
server:
  servicename: "bepostmanagement"
  bodylimit: 10485
  readbuffersize: 16384
  addr: ":8080"
  readtimeout: 10s
  writetimeout: 10s
  timeout: 40 ## Over all timeout for the request
  cors:       
    alloworigins:
      - "http://localhost:3000"
      - "http://localhost:8080"        
    allowheaders:
      - "Authorization"
      - "Content-Type"
      - "X-Request-Id"
    allowmethods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
  healthcheck: 
    endpoints:
      liveness:
      readiness:
log:
  level: ""
  format: "json"
  output: "stdout"
client: 
  baseurl: "http://localhost:8080"
url:
  masterdatabaseurl: "https://sit.cept.gov.in/bemasterdata/v1/"

  HttpUrl: 127.0.0.1
  HttpPort: 8080
  HttpAllowedOrigins: "*"
  loglevel: info
minio:
  url: https://stgminio.cept.gov.in
  accessKey: 
  bucketName: pdmanagement
  secretKey: 
