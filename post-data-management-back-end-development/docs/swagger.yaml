host: localhost:8080
info:
  contact:
    email: support_cept@indiapost.gov.in
    name: API Support Team
    url: http://cept.gov.in/support
  description: A comprehensive API for managing Post Management Data Management, offering
    endpoints for creation, update, deletion, and retrieval of Posts Data.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://cept.gov.in/terms
  title: Post Management Data Management API
  version: "1.0"
paths:
  /designation/list:
    get:
      consumes:
      - application/json
      description: List all designations from the database
      produces:
      - application/json
      responses:
        "200":
          description: List all designations from the database
          schema:
            items:
              $ref: '#/definitions/handler.DesignationMasterDetails'
            type: array
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/apierrors.APIErrorResponse'
        "401":
          description: Unauthorized error
          schema:
            $ref: '#/definitions/apierrors.APIErrorResponse'
        "403":
          description: Forbidden error
          schema:
